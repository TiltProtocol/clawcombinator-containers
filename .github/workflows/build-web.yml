name: build-web
on:
  workflow_dispatch:
    inputs:
      ref:
        description: clawcombinator-web git ref to build
        default: main
  schedule:
    - cron: '0 12 * * *'  # daily refresh
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download web source via API
        run: |
          mkdir -p /home/runner/work/web-source
          cd /home/runner/work/web-source
          REF="${{ inputs.ref || 'main' }}"
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.WEB_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/TiltProtocol/clawcombinator-web/tarball/${REF}" \
            -o source.tar.gz
          tar -xzf source.tar.gz --strip-components=1
          ls -la
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/tiltprotocol/clawcombinator-containers/web
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
      - uses: docker/build-push-action@v5
        with:
          context: /home/runner/work/web-source
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
